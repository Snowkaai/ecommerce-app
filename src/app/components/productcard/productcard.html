<div
  class="card"
  style="width: 280px; flex-shrink: 0; cursor: pointer; overflow: hidden"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
  (click)="goToProduct()"
>
  <!-- Product Image -->
  <img
    [src]="product.images[currentIndex()]"
    [class.fading]="isFading()"
    alt="{{ product.title }}"
    style="
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      transition: opacity 0.6s ease;
      opacity: 1;
    "
  />

  <!-- Card Body -->
  <div style="padding: 16px">
    <h3
      style="
        font-family: var(--font-display);
        font-size: var(--text-base);
        color: var(--color-text-base);
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      "
    >
      {{ product.title }}
    </h3>
    <p
      style="
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--color-brand);
        margin-bottom: 16px;
      "
    >
      ${{ product.price }}
    </p>
    <button class="btn-primary w-full" (click)="addToCart($event)">Add to Cart</button>
  </div>
</div>
