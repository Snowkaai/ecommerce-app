<header class="sticky top-0 z-50 border-b border-surface-border bg-surface/95 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
    <!-- Logo / App Name -->
    <a
      routerLink="/main/home"
      class="text-2xl font-bold font-display text-brand hover:text-brand-dark"
    >
      ShopVerse
    </a>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center gap-8">
      <a
        routerLink="/main/home"
        class="text-md-start font-medium text-text-base hover:text-brand transition-colors"
      >
        Home
      </a>

      <a
        routerLink="/main/shop"
        class="text-md-start font-medium text-text-base hover:text-brand transition-colors"
      >
        Shop
      </a>
    </nav>

    <!-- Right Actions -->
    <div class="flex items-center gap-3">
      <!-- Cart Button -->
      <button
        class="relative flex h-11 w-11 items-center justify-center rounded-full border border-surface-border bg-surface hover:bg-brand-light transition"
      >
        <!-- Cart Icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5 text-text-base"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1 5h12M10 21a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z"
          />
        </svg>

        <!-- Cart Badge -->
        <a
          class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-brand text-[10px] font-semibold text-white"
          routerLink="/main/shop"
        >
          2
        </a>
      </button>

      <!-- Login Button -->
      <a routerLink="/auth/login" class="btn btn-primary">Login</a>
    </div>
  </div>
</header>
