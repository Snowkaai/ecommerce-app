<div style="position: fixed; bottom: 24px; right: 24px; z-index: 1000;">
  <!-- Chat Head Button -->
  <button 
    class="btn btn-primary rounded-circle p-0" 
    (click)="toggleChat()"
    style="width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);"
    aria-label="Open chat"
  >
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width: 28px; height: 28px;">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H8l-2 2v-12h14v10z"/>
    </svg>
  </button>

  <!-- Chat Window -->
  <div 
    class="card" 
    [class.d-none]="!isOpen"
    style="position: absolute; bottom: 72px; right: 0; width: 400px; height: 600px; display: flex; flex-direction: column; box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16); border-radius: 12px; overflow: hidden;"
  >
    <!-- Header -->
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center" style="padding: 20px;">
      <div class="d-flex align-items-center gap-2">
        <h5 class="mb-0" style="font-size: 18px; font-weight: 600;">Chat Assistant</h5>
        <span class="badge bg-success" style="width: 8px; height: 8px; padding: 0; display: inline-block; border-radius: 50%;"></span>
        <span style="font-size: 12px; font-weight: 500;">Online</span>
      </div>
      <button 
        class="btn btn-close btn-close-white"
        (click)="closeChat()"
        aria-label="Close chat"
      ></button>
    </div>

    <!-- Messages Area -->
    <div class="flex-grow-1 chatfield" style="overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background-color: #f8f9fa;">
      
      <div *ngFor="let message of messages" 
          [class.d-flex]="true"
          [class.justify-content-start]="message.sender === 'bot'"
          [class.justify-content-end]="message.sender === 'user'">
        <div [class.bg-white]="message.sender === 'bot'"
            [class.bg-primary]="message.sender === 'user'"
            class="border rounded-3 p-3"
            style="max-width: 75%; font-size: 14px; line-height: 1.4;">
          <p class="mb-0" [innerHTML]="formatMessage(message.content)"></p>
        </div>
      </div>

      
    </div>

    <!-- Input Area -->
    <div class="card-footer border-top p-3" style="background-color: white;">
      <div class="input-group">
        <input 
          type="text" 
          class="form-control" 
          placeholder="Type your message..."
          [(ngModel)]="inputValue"
          style="border-radius: 8px; font-size: 14px;"
          aria-label="Message input"
        />
        <button 
          class="btn btn-primary" 
          type="button" 
          (click)="sendMessage(inputValue)"
          [disabled]="isLoading"
          aria-label="Send message">
          {{ isLoading ? 'Sending...' : 'Send' }}
        </button>
      </div>
    </div>
  </div>
</div>
