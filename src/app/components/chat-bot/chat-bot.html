<div style="position: fixed; bottom: 24px; right: 24px; z-index: 1000">
  <!-- Chat Head Button -->
  <button
    (click)="toggleChat()"
    class="btn-primary"
    aria-label="Open chat"
    style="
      width: 56px;
      height: 56px;
      border-radius: 50%;
      padding: 0;
      box-shadow: var(--shadow-hover);
    "
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="currentColor"
      style="width: 28px; height: 28px"
    >
      <path
        d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H8l-2 2v-12h14v10z"
      />
    </svg>
  </button>

  <!-- Chat Window -->
  @if (isOpen) {
    <div
      class="card"
      style="
        position: absolute;
        bottom: 72px;
        right: 0;
        width: 400px;
        height: 600px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: var(--shadow-modal);
      "
    >
      <!-- Header -->
      <div
        style="
          padding: 20px;
          background-color: var(--color-brand);
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div style="display: flex; align-items: center; gap: 8px">
          <h5
            style="
              margin: 0;
              font-size: var(--text-lg);
              font-weight: 600;
              color: white;
              font-family: var(--font-display);
            "
          >
            Chat Assistant
          </h5>
          <span
            style="
              width: 8px;
              height: 8px;
              border-radius: 50%;
              background-color: #4ade80;
              display: inline-block;
            "
          ></span>
          <span style="font-size: var(--text-xs); font-weight: 500; color: white">Online</span>
        </div>
        <button
          (click)="closeChat()"
          aria-label="Close chat"
          style="
            background: none;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 18px;
            line-height: 1;
            opacity: 0.8;
          "
        >
          ✕
        </button>
      </div>

      <!-- Messages Area -->
      <div
        class="chatfield"
        style="
          flex: 1;
          overflow-y: auto;
          padding: 20px;
          display: flex;
          flex-direction: column;
          gap: 12px;
          background-color: var(--color-surface-muted);
        "
      >
        <div
          *ngFor="let message of messages"
          style="display: flex"
          [style.justify-content]="message.sender === 'user' ? 'flex-end' : 'flex-start'"
        >
          <div
            style="
              max-width: 75%;
              font-size: var(--text-sm);
              line-height: 1.5;
              padding: 10px 14px;
              border-radius: var(--radius-md);
            "
            [style.background-color]="
              message.sender === 'user' ? 'var(--color-brand)' : 'var(--color-surface-elevated)'
            "
            [style.color]="message.sender === 'user' ? 'white' : 'var(--color-text-base)'"
            [style.box-shadow]="'var(--shadow-card)'"
          >
            <p style="margin: 0" [innerHTML]="formatMessage(message.content)"></p>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div
        style="
          padding: 12px 16px;
          background-color: var(--color-surface-elevated);
          border-top: 1px solid var(--color-surface-border);
          display: flex;
          gap: 8px;
        "
      >
        <input
          type="text"
          placeholder="Type your message..."
          [(ngModel)]="inputValue"
          aria-label="Message input"
          style="flex: 1"
        />
        <button
          type="button"
          class="btn-primary"
          (click)="sendMessage(inputValue)"
          [disabled]="isLoading"
        >
          {{ isLoading ? '...' : 'Send' }}
        </button>
      </div>
    </div>
  }
</div>
