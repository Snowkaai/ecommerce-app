

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 440px;">
    
    <div class="card-body p-5">

      <h3 class="text-center fw-bold text-primary">Welcome Back</h3>
      <p class="text-center text-muted mb-4">
        Login to manage your tasks efficiently
      </p>

      <form #loginForm="ngForm" (submit)="onLogin(loginForm)">

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>

          <input type="email"
                 class="form-control form-control-lg rounded-3"
                 name="email"
                 [(ngModel)]="user.email"
                 required
                 email
                 #email="ngModel"
                 placeholder="Enter your email">

          @if (email.dirty && email.invalid) {
            <div class="text-danger mt-1">
              Enter a valid email
            </div>
          }

        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>

          <input type="password"
                 class="form-control form-control-lg rounded-3"
                 name="password"
                 [(ngModel)]="user.password"
                 required
                 minlength="6"
                 #password="ngModel"
                 placeholder="Enter your password">

          @if (password.dirty && password.invalid) {
            <div class="text-danger mt-1">
              Password must be at least 6 characters
            </div>
          }

        </div>

        <!-- Remember + Forgot -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">
              Remember me
            </label>
          </div>

          <a href="#" class="text-decoration-none small">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <div class="d-grid">
          <button type="submit"
                  class="btn btn-primary btn-lg rounded-3"
                  [disabled]="loginForm.invalid">
            Login
          </button>
        </div>
        <div class="d-grid mt-2">
      <button type="button"
              class="btn btn-outline-primary btn-lg rounded-3"
              (click)="goToSignup()">
        Sign Up
      </button>
      <button (click)="login()">
  Login with Google
</button>


    </div>

      </form>


    </div>
  </div>

</div>
