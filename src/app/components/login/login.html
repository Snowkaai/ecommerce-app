<div
  class="min-h-screen flex items-center justify-center px-4"
  style="background-color: var(--color-surface-muted)"
>
  <div class="card w-full p-10" style="max-width: 440px">
    <!-- Header -->
    <div class="text-center mb-8">
      <h3 style="font-family: var(--font-display); color: var(--color-text-base)">Welcome Back</h3>
      <p class="mt-1" style="color: var(--color-text-muted); font-size: var(--text-sm)">
        Login to manage your tasks efficiently
      </p>
    </div>

    <form #loginForm="ngForm" (submit)="onLogin(loginForm)">
      <!-- Email -->
      <div class="mb-3">
        <label style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-base)">
          Email
        </label>
        <input
          type="email"
          class="mt-1"
          name="email"
          [(ngModel)]="user.email"
          required
          email
          #email="ngModel"
          placeholder="Enter your email"
        />

        @if (email.dirty && email.invalid) {
          <p class="mt-1" style="font-size: var(--text-xs); color: #ef4444">Enter a valid email</p>
        }
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-base)">
          Password
        </label>
        <input
          type="password"
          class="mt-1"
          name="password"
          [(ngModel)]="user.password"
          required
          minlength="6"
          #password="ngModel"
          placeholder="Enter your password"
        />

        @if (password.dirty && password.invalid) {
          <p class="mt-1" style="font-size: var(--text-xs); color: #ef4444">
            Password must be at least 6 characters
          </p>
        }
      </div>

      <!-- Remember + Forgot -->
      <div class="flex justify-between items-center mb-6">
        <label
          class="flex items-center gap-2"
          style="font-size: var(--text-sm); color: var(--color-text-muted); cursor: pointer"
        >
          <input type="checkbox" style="width: auto; accent-color: var(--color-brand)" />
          Remember me
        </label>
        <a href="#" style="font-size: var(--text-sm)">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-primary w-full" [disabled]="loginForm.invalid">Login</button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-4">
        <hr style="flex: 1; border-color: var(--color-surface-border)" />
        <span style="font-size: var(--text-xs); color: var(--color-text-light)">OR</span>
        <hr style="flex: 1; border-color: var(--color-surface-border)" />
      </div>

      <!-- Google Login -->
      <button type="button" class="btn-secondary w-full" (click)="login()">
        Login with Google
      </button>

      <!-- Sign Up -->
      <p class="text-center mt-2" style="font-size: var(--text-sm); color: var(--color-text-muted)">
        Don't have an account?
        <button
          type="button"
          (click)="goToSignup()"
          style="
            background: none;
            border: none;
            padding: 0;
            font-size: inherit;
            font-weight: 500;
            color: var(--color-brand);
            cursor: pointer;
          "
        >
          Sign Up
        </button>
      </p>
    </form>
  </div>
</div>
