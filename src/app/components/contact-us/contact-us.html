<div
  class="min-h-screen flex items-center justify-center px-4 py-12"
  style="background-color: var(--color-surface-muted)"
>
  <div class="card w-full p-10" style="max-width: 900px">
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 style="font-family: var(--font-display); color: var(--color-text-base)">Contact Us</h1>
      <p class="mt-2" style="color: var(--color-text-muted); font-size: var(--text-sm)">
        We'd love to hear from you. Send us your questions or feedback.
      </p>
    </div>

    <div class="flex gap-12 flex-wrap">
      <!-- Contact Info -->
      <div style="flex: 1; min-width: 200px">
        <h3
          style="
            font-family: var(--font-display);
            color: var(--color-text-base);
            margin-bottom: 24px;
          "
        >
          Get In Touch
        </h3>

        <div class="mb-6">
          <p
            style="
              font-size: var(--text-sm);
              font-weight: 600;
              color: var(--color-text-base);
              margin-bottom: 4px;
            "
          >
            Email
          </p>
          <p style="font-size: var(--text-sm); color: var(--color-text-muted); margin: 0">
            support&#64;ecommerce.com
          </p>
        </div>

        <div class="mb-6">
          <p
            style="
              font-size: var(--text-sm);
              font-weight: 600;
              color: var(--color-text-base);
              margin-bottom: 4px;
            "
          >
            Phone
          </p>
          <p style="font-size: var(--text-sm); color: var(--color-text-muted); margin: 0">
            +20 100 123 4567
          </p>
        </div>

        <div>
          <p
            style="
              font-size: var(--text-sm);
              font-weight: 600;
              color: var(--color-text-base);
              margin-bottom: 4px;
            "
          >
            Address
          </p>
          <p style="font-size: var(--text-sm); color: var(--color-text-muted); margin: 0">
            Cairo, Egypt
          </p>
        </div>
      </div>

      <!-- Divider -->
      <div style="width: 1px; background-color: var(--color-surface-border)"></div>

      <!-- Contact Form -->
      <div style="flex: 2; min-width: 280px">
        <form>
          <div class="mb-4">
            <label
              style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-base)"
            >
              Full Name
            </label>
            <input type="text" class="mt-1" placeholder="Enter your name" />
          </div>

          <div class="mb-4">
            <label
              style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-base)"
            >
              Email Address
            </label>
            <input type="email" class="mt-1" placeholder="Enter your email" />
          </div>

          <div class="mb-6">
            <label
              style="font-size: var(--text-sm); font-weight: 500; color: var(--color-text-base)"
            >
              Message
            </label>
            <textarea class="mt-1" rows="5" placeholder="Write your message"></textarea>
          </div>

          <button type="submit" class="btn-primary">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</div>
