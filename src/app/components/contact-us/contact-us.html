<div class="container py-5">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4 p-md-5">
      <h1 class="mb-4 fw-bold text-center">Contact Us</h1>

      <p class="text-muted text-center mb-5">
        We'd love to hear from you. Send us your questions or feedback.
      </p>

      <div class="row g-5">
        <!-- Contact Info -->
        <div class="col-md-5">
          <h4 class="fw-semibold mb-4">Get In Touch</h4>

          <div class="mb-4">
            <h6 class="fw-bold">Email</h6>
            <p class="text-secondary mb-0">support@ecommerce.com</p>
          </div>

          <div class="mb-4">
            <h6 class="fw-bold">Phone</h6>
            <p class="text-secondary mb-0">+20 100 123 4567</p>
          </div>

          <div class="mb-4">
            <h6 class="fw-bold">Address</h6>
            <p class="text-secondary mb-0">Cairo, Egypt</p>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="col-md-7">
          <form>
            <div class="mb-3">
              <label class="form-label">Full Name</label>

              <input type="text" class="form-control" placeholder="Enter your name" />
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>

              <input type="email" class="form-control" placeholder="Enter your email" />
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>

              <textarea rows="5" class="form-control" placeholder="Write your message"></textarea>
            </div>

            <button class="btn btn-dark px-4">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
